<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Library</title>
<style>
  /* System font stacks — no external requests */
  :root {
    --font-serif: ui-serif, 'New York', 'Palatino Linotype', Palatino, Georgia, serif;
    --font-mono:  ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', 'Courier New', monospace;
  }
</style>
<style>
  :root {
    --bg:        #0d0d0d;
    --surface:   #161616;
    --card:      #1e1e1e;
    --border:    #2a2a2a;
    --accent:    #e8a045;
    --accent2:   #c4733a;
    --text:      #f0ebe3;
    --muted:     #7a7068;
    --highlight: #e8a04520;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    -webkit-font-smoothing: antialiased;
  }

  /* ── SHARED ─────────────────────────────────────── */
  #app { min-height: 100vh; display: flex; flex-direction: column; }

  .logo {
    font-family: var(--font-serif);
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    top: 50%; left: 0;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--highlight);
  }

  .tag {
    display: inline-block;
    background: var(--highlight);
    color: var(--accent);
    border: 1px solid var(--accent2);
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    border-radius: 3px;
  }

  #count {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: .06em;
  }

  #results { flex: 1; }

  .song-link {
    display: block;
    text-decoration: none;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    transition: border-color .15s, background .15s, transform .1s;
    cursor: pointer;
  }
  .song-link:hover, .song-link:focus {
    border-color: var(--accent);
    background: #222;
    outline: none;
  }
  .song-link:active { transform: scale(0.99); }

  .song-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .song-ext {
    font-size: 10px;
    color: var(--accent);
    font-weight: 400;
    margin-left: 6px;
    opacity: .8;
  }
  .song-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 48px 24px;
  }
  .empty span {
    display: block;
    font-size: 32px;
    margin-bottom: 12px;
    opacity: .4;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 60px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── DESKTOP ──────────────────────────────────────── */
  body.desktop #app {
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }
  body.desktop header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 36px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }
  body.desktop .logo { font-size: 28px; }
  body.desktop .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .12em;
    text-transform: uppercase;
  }
  body.desktop .search-wrap svg { left: 14px; width: 16px; height: 16px; }
  body.desktop #search {
    padding: 12px 16px 12px 44px;
    font-size: 14px;
    border-radius: 6px;
  }
  body.desktop .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 20px 0 12px;
  }
  body.desktop .song-link {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 13px 18px;
    border-radius: 6px;
    margin-bottom: 6px;
    gap: 16px;
  }
  body.desktop .song-link:hover { transform: translateX(3px); }
  body.desktop .song-name { font-size: 14px; }
  body.desktop .play-hint {
    font-size: 11px;
    color: var(--muted);
    opacity: 0;
    transition: opacity .15s;
    white-space: nowrap;
  }
  body.desktop .song-link:hover .play-hint { opacity: 1; }

  /* ── MOBILE ──────────────────────────────────────── */
  body.mobile {
    background: var(--bg);
  }
  body.mobile #app {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }
  body.mobile header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
  }
  body.mobile .logo { font-size: 22px; margin-bottom: 12px; display: block; }
  body.mobile .logo-sub { display: none; }
  body.mobile .search-wrap svg { left: 12px; width: 16px; height: 16px; }
  body.mobile #search {
    padding: 11px 14px 11px 40px;
    font-size: 16px; /* prevents iOS zoom */
    border-radius: 10px;
  }
  body.mobile .toolbar {
    padding: 10px 16px 4px;
  }
  body.mobile #results {
    padding: 8px 12px 100px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  body.mobile .song-link {
    padding: 14px 16px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    -webkit-tap-highlight-color: transparent;
  }
  body.mobile .song-name { font-size: 14px; }
  body.mobile .play-hint { display: none; }

  /* ── SCROLLBAR ───────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── FADE IN ─────────────────────────────────────── */
  .song-link {
    animation: fadeUp .2s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="logo">♪ Library</span>
    <span class="logo-sub">Local music server</span>
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="search" placeholder="Search songs, artists, albums…" autocomplete="off" spellcheck="false">
    </div>
  </header>

  <div class="toolbar">
    <span id="count"></span>
  </div>

  <div id="results">
    <div class="spinner"></div>
  </div>
</div>

<script>
  // ── User-agent detection ─────────────────────────────────────────────────
  const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  document.body.classList.add(isMobile ? 'mobile' : 'desktop');

  // ── Audio extensions ─────────────────────────────────────────────────────
  const AUDIO_EXTS = new Set(['mp3','flac','wav','ogg','m4a','aac','opus','wma','aiff','alac']);

  // ── Fetch directory listing ───────────────────────────────────────────────
  async function fetchSongs() {
    try {
      const res = await fetch("./");
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const links = [...doc.querySelectorAll('a[href]')];

      return links
        .map(a => ({
          href: a.getAttribute('href'),
          name: decodeURIComponent(a.getAttribute('href')).replace(/\/$/, '')
        }))
        .filter(f => {
          const ext = f.name.split('.').pop().toLowerCase();
          return AUDIO_EXTS.has(ext);
        })
        .map(f => {
          const parts = f.name.split('.');
          const ext = parts.pop().toLowerCase();
          const base = parts.join('.');
          return { href: f.href, name: base, ext, full: f.name };
        })
        .sort((a, b) => a.name.localeCompare(b.name));
    } catch (e) {
      return [];
    }
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function highlight(text, query) {
    if (!query) return escHtml(text);
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return escHtml(text).replace(re, '<mark style="background:var(--highlight);color:var(--accent);border-radius:2px;">$1</mark>');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render(songs, query) {
    const el = document.getElementById('results');
    const countEl = document.getElementById('count');

    if (songs.length === 0) {
      countEl.textContent = '';
      el.innerHTML = `<div class="empty"><span>🎵</span>${query ? 'No songs match "' + escHtml(query) + '"' : 'No audio files found in this directory.'}</div>`;
      return;
    }

    countEl.textContent = `${songs.length} track${songs.length !== 1 ? 's' : ''}`;

    el.innerHTML = songs.map((s, i) => `
      <a class="song-link" href="${s.href}" style="animation-delay:${Math.min(i * 18, 300)}ms">
        <div>
          <div class="song-name">
            ${highlight(s.name, query)}<span class="song-ext">.${s.ext}</span>
          </div>
          <div class="song-meta">${s.ext.toUpperCase()}</div>
        </div>
        <span class="play-hint">▶ open</span>
      </a>
    `).join('');
  }

  // ── Search ────────────────────────────────────────────────────────────────
  let allSongs = [];

  function doSearch(q) {
    const query = q.trim().toLowerCase();
    if (!query) { render(allSongs, ''); return; }
    const filtered = allSongs.filter(s =>
      s.name.toLowerCase().includes(query) || s.ext.includes(query)
    );
    render(filtered, query);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  (async () => {
    allSongs = await fetchSongs();
    render(allSongs, '');

    const input = document.getElementById('search');
    let timer;
    input.addEventListener('input', e => {
      clearTimeout(timer);
      timer = setTimeout(() => doSearch(e.target.value), 120);
    });
    input.focus();
  })();
</script>
</body>
</html>
